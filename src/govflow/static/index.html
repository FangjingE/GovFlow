<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GovFlow · 政务事项检索</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --border: #d8dee4;
        --text: #1a2333;
        --muted: #5a6b7c;
        --primary: #1565a8;
        --user-bubble: #e3f0fc;
        --bot-bubble: #eef1f4;
        --err: #b3261e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem 0.75rem 0;
      }
      .shell {
        width: 100%;
        max-width: 56rem;
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }
      header .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
        font-size: 1.35rem;
      }
      .sub {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }
      .doc {
        font-size: 0.88rem;
        color: var(--primary);
      }
      #log {
        flex: 1;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: var(--panel);
        padding: 0.75rem;
        margin-top: 0.75rem;
        min-height: 12rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.6rem;
        align-items: flex-end;
      }
      textarea {
        flex: 1;
        resize: vertical;
        min-height: 2.5rem;
        max-height: 8rem;
        padding: 0.5rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 0.4rem;
        font: inherit;
      }
      button {
        font: inherit;
        padding: 0.45rem 0.9rem;
        border-radius: 0.4rem;
        border: 1px solid var(--border);
        background: var(--panel);
        cursor: pointer;
      }
      button#send {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .msg {
        margin-bottom: 0.65rem;
        padding: 0.55rem 0.65rem;
        border-radius: 0.45rem;
        max-width: 100%;
      }
      .msg.user {
        background: var(--user-bubble);
        margin-left: 2rem;
      }
      .msg.assistant {
        background: var(--bot-bubble);
        margin-right: 2rem;
      }
      .msg.system {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .msg.system.error {
        color: var(--err);
      }
      .markdown-body {
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .meta {
        margin-top: 0.35rem;
        font-size: 0.78rem;
        color: var(--muted);
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }
      footer {
        margin: 0.6rem 0;
        font-size: 0.82rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="header-top">
          <h1>GovFlow</h1>
          <button type="button" id="new-chat" title="清除当前消息并开始新会话">新对话</button>
        </div>
        <p class="sub">
          从事项库中检索<strong>最相关的一条</strong>政务事项，并按固定模板返回（当前不接大模型生成）。输入例如「身份证」「户口簿」等关键词。
        </p>
        <a class="doc" href="/docs" target="_blank" rel="noopener">OpenAPI 文档</a>
      </header>
      <div id="log" role="log" aria-live="polite" aria-relevant="additions"></div>
      <form class="row" id="f" novalidate>
        <label for="input" class="visually-hidden">输入</label>
        <textarea
          id="input"
          rows="1"
          placeholder="在此输入问题，按 Enter 发送，Shift+Enter 换行"
          autocomplete="off"
        ></textarea>
        <button type="submit" id="send">发送</button>
      </form>
    </div>
    <footer>
      <span id="foot-session">未建立会话</span>
    </footer>
    <script>
      (function () {
        var log = document.getElementById("log");
        var input = document.getElementById("input");
        var form = document.getElementById("f");
        var sendBtn = document.getElementById("send");
        var newChatBtn = document.getElementById("new-chat");
        var foot = document.getElementById("foot-session");
        var sessionId = null;
        var sending = false;
        var WELCOME =
          "你好。请输入与政务事项相关的问题，系统将返回匹配度最高的一条事项信息（模板展示）。咨询电话见回复文末。";

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function el(tag, cls, text) {
          var n = document.createElement(tag);
          if (cls) n.className = cls;
          if (text != null) n.textContent = text;
          return n;
        }

        function appendUser(text) {
          var m = el("div", "msg user", "");
          var body = document.createElement("div");
          body.className = "markdown-body";
          body.textContent = text;
          m.appendChild(body);
          log.appendChild(m);
          log.scrollTop = log.scrollHeight;
        }

        function appendSystem(text) {
          var m = el("div", "msg system", "");
          var body = document.createElement("div");
          body.className = "markdown-body";
          body.textContent = text;
          m.appendChild(body);
          log.appendChild(m);
          log.scrollTop = log.scrollHeight;
        }

        function appendError(text) {
          var m = el("div", "msg system error", text);
          log.appendChild(m);
          log.scrollTop = log.scrollHeight;
        }

        function appendAssistant(data) {
          var wrap = el("div", "msg assistant", "");
          var main = document.createElement("div");
          main.className = "markdown-body";
          main.innerHTML = escapeHtml(data.reply || "").replace(/\n/g, "<br>");
          wrap.appendChild(main);
          if (data.official_hotline) {
            wrap.appendChild(el("div", "meta", "咨询电话：" + data.official_hotline));
          }
          if (data.kind) {
            wrap.appendChild(el("div", "meta", "kind: " + data.kind));
          }
          log.appendChild(wrap);
          log.scrollTop = log.scrollHeight;
        }

        function setSession(id) {
          sessionId = id;
          foot.textContent = "会话: " + (id ? "已建立 (" + id.slice(0, 8) + "…)" : "未建立");
        }

        function resetChat() {
          sessionId = null;
          log.innerHTML = "";
          appendSystem(WELCOME);
          setSession(null);
          input.value = "";
          input.focus();
        }

        function setLoading(isLoading) {
          sending = isLoading;
          sendBtn.disabled = isLoading;
          if (newChatBtn) newChatBtn.disabled = isLoading;
        }

        async function postMessage(text) {
          setLoading(true);
          try {
            var body = { message: text };
            if (sessionId) body.session_id = sessionId;
            var res = await fetch("/v1/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            var j = null;
            try {
              j = await res.json();
            } catch (e) {
              appendError("无法解析服务响应 (HTTP " + res.status + ")");
              return;
            }
            if (!res.ok) {
              var d = (j && j.detail) || (j && j.message) || JSON.stringify(j);
              appendError("请求失败 (" + res.status + "): " + d);
              return;
            }
            if (j.session_id) setSession(j.session_id);
            appendAssistant(j);
          } catch (e) {
            appendError("网络错误: " + (e && e.message ? e.message : String(e)));
          } finally {
            setLoading(false);
            input.focus();
          }
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          if (sending) return;
          var t = (input.value || "").trim();
          if (!t) return;
          appendUser(t);
          input.value = "";
          postMessage(t);
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            form.requestSubmit();
          }
        });

        if (newChatBtn) {
          newChatBtn.addEventListener("click", function () {
            if (sending) return;
            resetChat();
          });
        }

        appendSystem(WELCOME);
        input.focus();
      })();
    </script>
  </body>
</html>
