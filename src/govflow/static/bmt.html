<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>边民通 · 互市申报（演示）</title>
    <style>
      :root {
        --bg: #f0f4f2;
        --panel: #fff;
        --border: #c5d4cc;
        --text: #1a2e24;
        --muted: #4a6356;
        --accent: #1b6b4a;
        --accent-h: #145a3d;
        --user: #d4ede4;
        --bot: #e8f0ec;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, "Segoe UI", "PingFang SC", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 0.75rem;
      }
      .wrap {
        max-width: 56rem;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        min-height: calc(100dvh - 1.5rem);
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      h1 {
        font-size: 1.15rem;
        margin: 0;
        font-weight: 600;
      }
      .sub {
        width: 100%;
        font-size: 0.8rem;
        color: var(--muted);
        margin: 0;
      }
      .nav a {
        font-size: 0.8rem;
        color: var(--accent);
        text-decoration: none;
        margin-left: 0.6rem;
      }
      .nav a:hover {
        text-decoration: underline;
      }
      .main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        flex: 1;
        min-height: 0;
      }
      @media (max-width: 48rem) {
        .main {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 16rem;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 0.65rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .panel h2 {
        font-size: 0.9rem;
        margin: 0 0 0.5rem 0;
        color: var(--muted);
        font-weight: 600;
      }
      #log {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        min-height: 10rem;
        max-height: 42vh;
      }
      .msg {
        padding: 0.45rem 0.55rem;
        border-radius: 0.35rem;
        font-size: 0.9rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        max-width: 100%;
      }
      .msg.assistant {
        background: var(--bot);
        border: 1px solid var(--border);
        align-self: flex-start;
      }
      .msg.user {
        background: var(--user);
        border: 1px solid #9bc4af;
        align-self: flex-end;
      }
      .msg.meta {
        font-size: 0.7rem;
        color: var(--muted);
        align-self: center;
        border: 1px dashed var(--border);
        background: #fafcfb;
      }
      #formBox {
        flex: 1;
        overflow: auto;
        min-height: 8rem;
        max-height: 48vh;
      }
      #formBox pre {
        margin: 0;
        font-size: 0.78rem;
        line-height: 1.45;
        font-family: ui-monospace, "Cascadia Code", monospace;
        color: #1a2e24;
        white-space: pre-wrap;
      }
      .form-placeholder {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .row {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.5rem;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      textarea {
        flex: 1 1 12rem;
        min-height: 2.5rem;
        max-height: 6rem;
        padding: 0.45rem 0.5rem;
        font: inherit;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        border-radius: 0.35rem;
        resize: vertical;
      }
      button {
        font: inherit;
        padding: 0.45rem 0.85rem;
        border-radius: 0.35rem;
        cursor: pointer;
        font-weight: 500;
      }
      #send {
        background: var(--accent);
        color: #fff;
        border: none;
        height: 2.5rem;
      }
      #send:disabled,
      #new-sess:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #send:hover:not(:disabled) {
        background: var(--accent-h);
      }
      #new-sess {
        background: var(--panel);
        color: var(--accent);
        border: 1px solid var(--border);
        height: 2.5rem;
      }
      #foot {
        font-size: 0.7rem;
        color: var(--muted);
        text-align: center;
        padding: 0.3rem 0 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>边民通 · AI 对话式申报（演示）</h1>
        <div class="nav">
          <a href="/">GovFlow 主页</a>
          <a href="/docs" target="_blank" rel="noopener">API 文档</a>
        </div>
        <p class="sub">
          与「政务办事助手」不同，本页直连 <code>POST /v1/bmt/turn</code>。分步问净重、<strong>毛重</strong>、件数、<strong>包装/携运方式</strong>、产地、金额、<strong>价格依据</strong>、自用/代购等。填写过程中可<strong>用自然话提问</strong>，回答由 <code>knowledge_base/边民通</code> 关键词 RAG + 配置的大模型（<code>GOVFLOW_LLM_PROVIDER</code>）据摘录生成。申报为演示预览，非实链关务系统。
        </p>
      </header>
      <div class="main">
        <div class="panel">
          <h2>对话</h2>
          <div id="log" role="log" aria-live="polite"></div>
          <form class="row" id="f">
            <label class="visually-hidden" for="input">输入</label>
            <textarea id="input" rows="1" placeholder="用普通话说即可，例如：进口" autocomplete="off"></textarea>
            <button type="button" id="new-sess" title="新会话">新申报</button>
            <button type="submit" id="send">发送</button>
          </form>
        </div>
        <div class="panel">
          <h2>申报表预览</h2>
          <div id="formBox">
            <p class="form-placeholder" id="formPh">开始对话后，将在此显示与申报单同步的文字表格。</p>
            <pre id="formPre" style="display: none"></pre>
          </div>
        </div>
      </div>
      <p id="foot">
        <span id="status"></span>
      </p>
    </div>
    <style>
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
        padding: 0;
        margin: -1px;
      }
    </style>
    <script>
      (function () {
        var log = document.getElementById("log");
        var formPre = document.getElementById("formPre");
        var formPh = document.getElementById("formPh");
        var input = document.getElementById("input");
        var f = document.getElementById("f");
        var sendBtn = document.getElementById("send");
        var newSess = document.getElementById("new-sess");
        var status = document.getElementById("status");
        var sessionId = null;
        var busy = false;

        function setStatus(t) {
          if (status) status.textContent = t || "";
        }
        function el(clz, text) {
          var n = document.createElement("div");
          n.className = "msg " + clz;
          n.textContent = text;
          return n;
        }
        function showForm(text) {
          if (!text || !String(text).trim()) {
            formPre.style.display = "none";
            formPh.style.display = "block";
            return;
          }
          formPh.style.display = "none";
          formPre.style.display = "block";
          formPre.textContent = text;
        }
        function setBusy(b) {
          busy = b;
          sendBtn.disabled = b;
          if (newSess) newSess.disabled = b;
        }
        function appendAssistant(text) {
          log.appendChild(el("assistant", text));
          log.scrollTop = log.scrollHeight;
        }
        function appendUser(text) {
          log.appendChild(el("user", text));
          log.scrollTop = log.scrollHeight;
        }
        function appendMeta(text) {
          log.appendChild(el("meta", text));
          log.scrollTop = log.scrollHeight;
        }

        async function postBmt(body) {
          setBusy(true);
          try {
            var res = await fetch("/v1/bmt/turn", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            var j = null;
            try {
              j = await res.json();
            } catch (e) {
              appendMeta("服务响应无法解析: HTTP " + res.status);
              return;
            }
            if (!res.ok) {
              appendMeta((j && (j.detail || j.message)) || "请求失败 " + res.status);
              return;
            }
            if (j.session_id) sessionId = j.session_id;
            if (j.reply) appendAssistant(j.reply);
            if (j && j.kind === "knowledge" && j.rag_sources && j.rag_sources.length) {
              var lines = j.rag_sources
                .map(function (r, i) {
                  var t = (r && (r.title || r["title"])) || "来源" + (i + 1);
                  return (i + 1) + ". " + t;
                })
                .join("\n");
              appendMeta("RAG 引用条（" + j.rag_sources.length + "）\n" + lines);
            }
            showForm(j.form_preview);
            setStatus(
              "步骤: " +
                (j.step || "—") +
                " ｜ 状态: " +
                (j.kind || "—") +
                (j.submit_receipt ? " ｜ 回执: " + j.submit_receipt : "")
            );
          } catch (e) {
            appendMeta("网络错误: " + (e && e.message));
          } finally {
            setBusy(false);
            input.focus();
          }
        }

        function startSession() {
          log.innerHTML = "";
          sessionId = null;
          showForm("");
          setStatus("正在开始…");
          return postBmt({ message: "", locale: "zh-CN" });
        }

        f.addEventListener("submit", function (e) {
          e.preventDefault();
          if (busy) return;
          var t = (input.value || "").trim();
          if (!t) return;
          appendUser(t);
          input.value = "";
          var body = { message: t, locale: "zh-CN" };
          if (sessionId) body.session_id = sessionId;
          postBmt(body);
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            f.requestSubmit();
          }
        });

        if (newSess) {
          newSess.addEventListener("click", function () {
            if (busy) return;
            startSession();
          });
        }

        setStatus("加载中…");
        startSession();
      })();
    </script>
  </body>
</html>
